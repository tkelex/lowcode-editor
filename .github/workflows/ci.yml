name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lowcode_editor_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lowcode_editor_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lowcode_editor_ci?schema=public
      JWT_SECRET: ci-secret-change-me
      JWT_EXPIRES_IN: 7d
      FRONTEND_ORIGIN: http://127.0.0.1:5173
      PORT: 3000
      API_BASE_URL: http://127.0.0.1:3000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npm run prisma:generate --prefix server

      - name: Run checks
        run: npm run check

      - name: Apply database migrations
        run: npm run prisma:deploy --prefix server

      - name: Start API server
        run: |
          npm run start --prefix server > server-ci.log 2>&1 &
          echo $! > server-ci.pid

      - name: Wait for API health
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:3000/api/health; then
              exit 0
            fi
            sleep 2
          done
          cat server-ci.log
          exit 1

      - name: Run API smoke
        run: npm run smoke:api

      - name: Run mocked E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-ci-log
          path: server-ci.log
          if-no-files-found: ignore
