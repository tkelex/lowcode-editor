services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lowcode_editor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lowcode_editor"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lowcode_editor?schema=public
      JWT_SECRET: change-me-before-production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      FRONTEND_ORIGIN: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run prisma:deploy && npm run start"
    ports:
      - "3000:3000"

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  postgres_data:
